<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jabalí FC</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
:root{\n  --green:#1a7a3c;--green-dark:#0f5228;--green-light:#e8f5ed;--green-mid:#2d9e54;\n  --gold:#c9a84c;--gold-light:#f5edda;--red:#c0392b;--red-light:#fdf0ee;\n  --blue:#1a5fa8;--blue-light:#e8f0fb;--purple:#6c3fcf;--purple-light:#f0ebff;\n  --orange:#e67e22;--orange-light:#fef0e6;\n  --bg:#f4f6f3;--bg2:#fff;--text:#1a1f1c;--text2:#4a5549;--text3:#8a9988;\n  --border:rgba(0,0,0,0.08);--border2:rgba(0,0,0,0.14);--radius:10px;--radius-lg:16px;\n  --color-acento: #8e2de2;\n  --color-acento-hover: #4a00e0;\n}\n*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}\nbody{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}\n\n/* --- ESTILOS COMPLEMENTARIOS PARA EL MODAL DEL EDITOR DE CARTAS --- */\n.modal-overlay {\n    position: fixed;\n    top: 0; left: 0; width: 100%; height: 100%;\n    background: rgba(0, 0, 0, 0.8);\n    backdrop-filter: blur(6px);\n    display: flex; justify-content: center; align-items: center;\n    z-index: 2000;\n}\n\n.modal-content {\n    background: #16181f;\n    color: #ffffff;\n    padding: 25px;\n    border-radius: 16px;\n    max-width: 850px; width: 92%;\n    max-height: 90vh; overflow-y: auto;\n    position: relative;\n    border: 1px solid rgba(255,255,255,0.1);\n    box-shadow: 0 10px 30px rgba(0,0,0,0.7);\n}\n\n.close-modal-btn {\n    position: absolute;\n    top: 15px; right: 20px;\n    font-size: 30px; cursor: pointer; color: #8f9cae;\n    transition: color 0.2s;\n}\n.close-modal-btn:hover { color: #fff; }\n\n.card-editor-container {\n    display: flex; gap: 30px; flex-wrap: wrap; margin-top: 15px;\n}\n\n.card-preview-wrapper {\n    flex: 1; min-width: 270px;\n    display: flex; flex-direction: column; align-items: center; justify-content: center;\n    background: rgba(0,0,0,0.4); padding: 20px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.05);\n}\n\n.editor-form {\n    flex: 1.4; min-width: 320px; text-align: left;\n}\n\n.editor-form h3 {\n    font-size: 0.95rem; color: #8f9cae; margin: 20px 0 10px 0;\n    text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 5px;\n}\n.editor-form h3:first-of-type { margin-top: 0; }\n\n.form-row { display: flex; gap: 12px; }\n.form-group { display: flex; flex-direction: column; margin-bottom: 14px; width: 100%; }\n.form-group label { font-size: 11px; color: #8f9cae; margin-bottom: 5px; text-transform: uppercase; }\n.form-group input, .form-group select {\n    background: #1e222b; border: 1px solid rgba(255,255,255,0.1); padding: 10px; color: white; border-radius: 6px; outline: none;\n}\n.form-group input:focus, .form-group select:focus { border-color: var(--color-acento); }\n\n.file-upload-box {\n    border: 1px dashed rgba(255,255,255,0.1); padding: 10px; display: flex; justify-content: space-between; align-items: center; border-radius: 6px; background: #1e222b;\n}\n.file-upload-box button {\n    background: rgba(255,255,255,0.1); border: none; color: white; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-size: 12px;\n}\n.file-upload-box button:hover { background: var(--color-acento); }\n\n.sliders-list { display: flex; flex-direction: column; gap: 8px; }\n.slider-item { display: flex; align-items: center; gap: 12px; margin-bottom: 5px; }\n.slider-item label { width: 110px; font-size: 13px; color: #ffffff; text-align: left; }\n.slider-item input[type=range] { flex: 1; accent-color: var(--color-acento); cursor: pointer; }\n.slider-item span { width: 80px; text-align: right; font-size: 13px; font-weight: bold; color: #8f9cae; }\n\n/* --- DISEÑO DE LA CARTA --- */\n#futbol-card {\n    width: 250px; height: 350px;\n    border-radius: 18px; position: relative; padding: 18px; box-sizing: border-box;\n    display: flex; flex-direction: column; align-items: center; color: white;\n    font-family: 'Arial Black', Impact, sans-serif; box-shadow: 0 10px 25px rgba(0,0,0,0.5);\n    transition: all 0.3s ease; overflow: hidden;\n}\n\n.tier-jabali   { background: linear-gradient(135deg, #3a3d40, #181a1b); border: 2px solid #555; }\n.tier-bronce   { background: linear-gradient(135deg, #8a4f2a, #361909); border: 2px solid #a05a2c; }\n.tier-plata    { background: linear-gradient(135deg, #a1a8ad, #43484c); border: 2px solid #bcc6cc; }\n.tier-oro      { background: linear-gradient(135deg, #b89726, #544102); border: 2px solid #d4af37; }\n.tier-especial { \n    background: linear-gradient(135deg, #500df2, #8113e6); border: 2px solid #a146ff;\n    box-shadow: 0 0 25px rgba(142, 45, 226, 0.6), inset 0 0 15px rgba(255,255,255,0.2);\n}\n\n.card-header-row { width: 100%; display: flex; justify-content: space-between; align-items: baseline; }\n.card-ovr { font-size: 44px; font-weight: 900; line-height: 1; letter-spacing: -1px; }\n.card-pos { font-size: 13px; background: rgba(0,0,0,0.4); padding: 2px 7px; border-radius: 5px; font-family: sans-serif; font-weight: bold; }\n\n.card-avatar {\n    width: 110px; height: 110px; border-radius: 50%;\n    background: rgba(255,255,255,0.08); border: 2px dashed rgba(255,255,255,0.2);\n    margin: 10px 0; display: flex; align-items: center; justify-content: center;\n}\n.avatar-placeholder { font-size: 36px; color: rgba(255,255,255,0.3); }\n.card-name { font-size: 16px; letter-spacing: 0.5px; margin-bottom: 12px; text-align: center; text-shadow: 1px 2px 4px rgba(0,0,0,0.6); }\n\n.card-mini-stats {\n    display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px;\n    width: 100%; text-align: center; background: rgba(0,0,0,0.25); padding: 8px; border-radius: 10px;\n    backdrop-filter: blur(2px); font-family: sans-serif;\n}\n.card-mini-stats div { display: flex; flex-direction: column; }\n.card-mini-stats span { font-size: 13px; font-weight: bold; }\n.card-mini-stats small { font-size: 8px; color: #b3b3b3; text-transform: uppercase; }\n\n.tier-badge-container { margin: 12px 0 4px 0; text-align: center; font-size: 12px; color: #8f9cae; }\n.tier-badge-container strong { color: #ffffff; margin-left: 4px; }\n\n.btn-save-img {\n    margin-top: 10px; width: 100%; padding: 11px; background: var(--color-acento); border: none; \n    color: white; font-weight: bold; border-radius: 8px; cursor: pointer; transition: background 0.2s;\n}\n.btn-save-img:hover { background: var(--color-acento-hover); }\n</style>
</head>
<body>

<div id="cardEditorModal" class="modal-overlay" style="display: none;">
    <div class="modal-content">
        <span class="close-modal-btn" onclick="cerrarEditor()">&times;</span>
        
        <div class="card-editor-container">
            <div class="card-preview-wrapper">
                <div id="futbol-card" class="tier-bronce">
                    <div class="card-header-row">
                        <span id="cardOvrDisplay" class="card-ovr">55</span>
                        <span class="card-pos" id="cardPosDisplay">POR</span>
                    </div>
                    <div class="card-avatar" id="cardAvatar">
                        <span class="avatar-placeholder" id="cardPlaceholderLetter">J</span>
                    </div>
                    <div class="card-name" id="cardNameDisplay">JUGADOR</div>
                    
                    <div class="card-mini-stats">
                        <div><span id="mini-vel">26</span><small>VEL</small></div>
                        <div><span id="mini-tec">26</span><small>TEC</small></div>
                        <div><span id="mini-fue">51</span><small>FUE</small></div>
                        <div><span id="mini-esp">100</span><small>ESP</small></div>
                        <div><span id="mini-sta">75</span><small>STA</small></div>
                        <div><span id="mini-alt">51</span><small>ALT</small></div>
                    </div>
                </div>
                <div class="tier-badge-container">
                    <span>TIER:</span><strong id="cardTierDisplay">Bronce</strong>
                </div>
                <button id="btnDownloadCard" class="btn-save-img" onclick="descargarCartaPNG()">Guardar carta como imagen</button>
            </div>

            <div class="editor-form">
                <h3>Jugador</h3>
                <div class="form-row">
                    <div class="form-group">
                        <label>Nombre</label>
                        <input type="text" id="inputNombre" oninput="actualizarCarta()">
                    </div>
                    <div class="form-group" style="width: 90px;">
                        <label>Número (#)</label>
                        <input type="number" id="inputNumero" oninput="actualizarCarta()">
                    </div>
                </div>
                
                <div class="form-group">
                    <label>Posición</label>
                    <select id="selectPosicion" onchange="actualizarCarta()">
                        <option value="POR">Portero</option>
                        <option value="DEF">Defensa</option>
                        <option value="MC">Mediocampista</option>
                        <option value="DEL">Delantero</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Foto de Perfil</label>
                    <div class="file-upload-box">
                        <span>Tu foto aparecerá directamente en la carta</span>
                        <input type="file" id="inputFoto" accept="image/*" style="display:none" onchange="procesarFoto(this)">
                        <button type="button" onclick="document.getElementById('inputFoto').click()">Subir foto</button>
                    </div>
                </div>

                <h3>Estadísticas</h3>
                <div class="sliders-list">
                    <div class="slider-item">
                        <label>⚡ Velocidad</label>
                        <input type="range" id="rangeVelocidad" min="1" max="99" oninput="actualizarStat('Velocidad', this.value)">
                        <span id="valVelocidad">26</span>
                    </div>
                    <div class="slider-item">
                        <label>🎯 Técnica</label>
                        <input type="range" id="rangeTecnica" min="1" max="99" oninput="actualizarStat('Tecnica', this.value)">
                        <span id="valTecnica">26</span>
                    </div>
                    <div class="slider-item">
                        <label>💪 Fuerza</label>
                        <input type="range" id="rangeFuerza" min="1" max="99" oninput="actualizarStat('Fuerza', this.value)">
                        <span id="valFuerza">51</span>
                    </div>
                    <div class="slider-item">
                        <label>🔥 Espíritu</label>
                        <input type="range" id="rangeEspiritu" min="1" max="99" oninput="actualizarStat('Espiritu', this.value)">
                        <span id="valEspiritu">100</span>
                    </div>
                    <div class="slider-item">
                        <label>🫁 Stamina</label>
                        <input type="range" id="rangeStamina" min="1" max="99" oninput="actualizarStat('Stamina', this.value)">
                        <span id="valStamina">75</span>
                    </div>
                    <div class="slider-item">
                        <label>📏 Altura</label>
                        <input type="range" id="rangeAltura" min="1" max="99" oninput="actualizarStat('Altura', this.value)">
                        <span id="valAltura">51</span>
                    </div>
                </div>

                <h3>MVPs Ganados (Simulación)</h3>
                <div class="slider-item">
                    <input type="range" id="rangeMvps" min="0" max="10" step="1" oninput="actualizarMvps(this.value)">
                    <span id="valMvps">2=Bronce</span>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
// ... (Aquí van tus funciones existentes del Dashboard: loadAll, db, tabs, etc.) ...

// =================================═══════════════════════
// NUEVA LÓGICA: CONTROLADOR DEL EDITOR DE CARTAS (SÚPER INTEGRADO)
// =================================═══════════════════════

function abrirEditorJugador(datosJugador) {
    if (!datosJugador) return;

    // Población de datos iniciales en los inputs del formulario
    document.getElementById('inputNombre').value = datosJugador.name || datosJugador.nombre || 'Jugador';
    document.getElementById('inputNumero').value = datosJugador.numero || 10;
    document.getElementById('selectPosicion').value = datosJugador.posicion || 'MC';

    // Cargar estadísticas preexistentes
    document.getElementById('rangeVelocidad').value = datosJugador.velocidad || 50;
    document.getElementById('rangeTecnica').value = datosJugador.tecnica || 50;
    document.getElementById('rangeFuerza').value = datosJugador.fuerza || 50;
    document.getElementById('rangeEspiritu').value = datosJugador.espiritu || 50;
    document.getElementById('rangeStamina').value = datosJugador.stamina || 50;
    document.getElementById('rangeAltura').value = datosJugador.altura || 50;
    document.getElementById('rangeMvps').value = datosJugador.mvps || 0;

    refrescarTextosSliders();
    actualizarCarta();

    // Desplegar Modal
    document.getElementById('cardEditorModal').style.display = 'flex';
}

function refrescarTextosSliders() {
    ['Velocidad', 'Tecnica', 'Fuerza', 'Espiritu', 'Stamina', 'Altura'].forEach(stat => {
        const val = document.getElementById(`range${stat}`).value;
        document.getElementById(`val${stat}`).textContent = val;
    });
    actualizarMvps(document.getElementById('rangeMvps').value);
}

function actualizarStat(statName, valor) {
    document.getElementById(`val${statName}`).textContent = valor;
    actualizarCarta();
}

function actualizarMvps(valor) {
    let textoTier = "0=Jabalí";
    if (valor >= 2 && valor < 4) textoTier = "2=Bronce";
    if (valor >= 4 && valor < 6) textoTier = "4=Plata";
    if (valor >= 6 && valor < 8) textoTier = "6=Oro";
    if (valor >= 8) textoTier = "8+=Especial";
    
    document.getElementById('valMvps').textContent = textoTier;
    actualizarCarta();
}

function actualizarCarta() {
    const nombre = document.getElementById('inputNombre').value.trim() || 'JUGADOR';
    const posicion = document.getElementById('selectPosicion').value;
    
    const vel = parseInt(document.getElementById('rangeVelocidad').value);
    const tec = parseInt(document.getElementById('rangeTecnica').value);
    const fue = parseInt(document.getElementById('rangeFuerza').value);
    const esp = parseInt(document.getElementById('rangeEspiritu').value);
    const sta = parseInt(document.getElementById('rangeStamina').value);
    const alt = parseInt(document.getElementById('rangeAltura').value);
    const mvps = parseInt(document.getElementById('rangeMvps').value);

    // Calcular el OVR real matemático (redondeado)
    const ovr = Math.round((vel + tec + fue + esp + sta + alt) / 6);

    // Actualizar elementos visuales
    document.getElementById('cardNameDisplay').textContent = nombre.toUpperCase();
    document.getElementById('cardPosDisplay').textContent = posicion;
    document.getElementById('cardOvrDisplay').textContent = ovr;
    document.getElementById('cardPlaceholderLetter').textContent = nombre.charAt(0).toUpperCase();

    document.getElementById('mini-vel').textContent = vel;
    document.getElementById('mini-tec').textContent = tec;
    document.getElementById('mini-fue').textContent = fue;
    document.getElementById('mini-esp').textContent = esp;
    document.getElementById('mini-sta').textContent = sta;
    document.getElementById('mini-alt').textContent = alt;

    // Manejo de fondos por Tiers
    const carta = document.getElementById('futbol-card');
    const tierDisplay = document.getElementById('cardTierDisplay');
    carta.className = '';

    if (mvps >= 8) {
        carta.classList.add('tier-especial');
        tierDisplay.innerHTML = "Especial <span style='color:#e0aaff;'>✨</span>";
    } else if (mvps >= 6) {
        carta.classList.add('tier-oro');
        tierDisplay.textContent = "Oro 🪙";
    } else if (mvps >= 4) {
        carta.classList.add('tier-plata');
        tierDisplay.textContent = "Plata 🥈";
    } else if (mvps >= 2) {
        carta.classList.add('tier-bronce');
        tierDisplay.textContent = "Bronce 🥉";
    } else {
        carta.classList.add('tier-jabali');
        tierDisplay.textContent = "Jabalí 🐗";
    }
}

function procesarFoto(input) {
    if (input.files && input.files[0]) {
        const reader = new FileReader();
        reader.onload = function(e) {
            const avatarDiv = document.getElementById('cardAvatar');
            avatarDiv.innerHTML = ''; 
            avatarDiv.style.backgroundImage = `url('${e.target.result}')`;
            avatarDiv.style.backgroundSize = 'cover';
            avatarDiv.style.backgroundPosition = 'center';
            avatarDiv.style.border = '2px solid rgba(255,255,255,0.6)';
        }
        reader.readAsDataURL(input.files[0]);
    }
}

function cerrarEditor() {
    document.getElementById('cardEditorModal').style.display = 'none';
}

function descargarCartaPNG() {
    const contenedorCarta = document.getElementById('futbol-card');
    const nombreArchivo = document.getElementById('inputNombre').value.trim() || 'Carta';
    
    html2canvas(contenedorCarta, {
        useCORS: true,
        scale: 2,
        backgroundColor: null
    }).then(canvas => {
        const enlace = document.createElement('a');
        enlace.download = `Carta_${nombreArchivo.replace(/\s+/g, '_')}.png`;
        enlace.href = canvas.toDataURL('image/png');
        enlace.click();
    }).catch(error => {
        console.error("Error exportando imagen:", error);
    });
}
</script>
</body>
</html>
